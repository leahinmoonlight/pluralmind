name: release

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Get the version from package.json and sanity check it matches our release
        run: |
          CODE_VERSION=$(jq -r .version package.json)
          RELEASE_VERSION="${{ github.event.release.tag_name }}"
          if [ "v$CODE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "::error::Release version $RELEASE_VERSION doesn't match package.json v$CODE_VERSION."
            exit 1
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install

      - name: Build library
        run: pnpm build

      - name: Publish to npm
        run: pnpm publish --no-git-checks

  docs:
    needs: release
    uses: ./.github/workflows/docs.yml
    secrets: inherit
